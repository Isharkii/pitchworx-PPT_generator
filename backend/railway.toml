[build]
builder = "NIXPACKS"
buildCommand = "npm install --prefer-offline && npx prisma generate"

[deploy]
startCommand = "npx prisma migrate deploy && node --import tsx/esm src/server.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.deploy]
minInstances = 1
