# ── TESTING ONLY — Railway deployment config ──────────────────────────────────
# Remove this file when switching to VPS. See deploy/vps/ for production config.

[build]
builder = "NIXPACKS"
buildCommand = "npm install --prefer-offline && npx prisma generate"

[deploy]
startCommand = "npx tsx src/server.ts"
# healthcheckPath = "/health"   # temporarily disabled for debugging
# healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.deploy]
minInstances = 1
