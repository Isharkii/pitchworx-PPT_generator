# ── Railway deployment config (TESTING ONLY) ──────────────────────────────────
# This is used for Railway-based testing deployments.
# To remove testing infrastructure, delete this entire deploy/testing/ folder
# and remove backend/railway.toml.

[build]
builder = "NIXPACKS"
buildCommand = "npm install --prefer-offline && npx prisma generate"

[deploy]
startCommand = "npx prisma migrate deploy; npx tsx src/server.ts"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.deploy]
minInstances = 1
